name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Scanner self-check (--dump)
        run: swift run claudewatch --dump || true  # no live sessions on CI; must not crash

      - name: Package app bundle
        run: ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claudewatch-app
          path: Claudewatch.zip
          if-no-files-found: error
